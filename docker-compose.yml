services:
  realdoor:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      PORT: "8000"
      FRONTEND_ORIGINS: http://localhost:5173
      USE_IN_MEMORY_REPOSITORY: "true"
      SESSION_TTL_MINUTES: "60"
      PACKET_TTL_MINUTES: "60"
    restart: unless-stopped
